<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Registration</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    .form-group { margin-bottom: 12px; }
    label { display: inline-block; width: 140px; }
    input { padding: 5px; width: 220px; }
    .error { color: red; margin-top: 10px; }
    .success { color: green; margin-top: 10px; }
  </style>
</head>
<body>

  <h2>User Registration Form</h2>
  <form id="userForm">
    <div class="form-group">
      <label>First Name:</label>
      <input type="text" id="firstName" required>
    </div>
    <div class="form-group">
      <label>Last Name:</label>
      <input type="text" id="lastName" required>
    </div>
    <div class="form-group">
      <label>Mobile No:</label>
      <input type="text" id="mobileNo" placeholder="10 digits" required>
    </div>
    <div class="form-group">
      <label>Email ID:</label>
      <input type="email" id="email" required>
    </div>

    <h4>Address</h4>
    <div class="form-group">
      <label>Street:</label>
      <input type="text" id="street">
    </div>
    <div class="form-group">
      <label>City:</label>
      <input type="text" id="city">
    </div>
    <div class="form-group">
      <label>State:</label>
      <input type="text" id="state">
    </div>
    <div class="form-group">
      <label>Country:</label>
      <input type="text" id="country">
    </div>

    <h4>Account Info</h4>
    <div class="form-group">
      <label>Login ID:</label>
      <input type="text" id="loginId" placeholder="8 alphanumeric chars" required>
    </div>
    <div class="form-group">
      <label>Password:</label>
      <input type="password" id="password" placeholder="6+ chars, 1 Upper, 1 Lower, 1 Special" required>
    </div>

    <button type="button" id="saveBtn">Save</button>
  </form>

  <div id="responseMessage"></div>
  <p><a href="users.html">View Stored Users</a></p>

  <script>
    $(document).ready(function() {
      $('#saveBtn').click(function() {
        const formData = {
          firstName: $('#firstName').val(),
          lastName: $('#lastName').val(),
          mobileNo: $('#mobileNo').val(),
          email: $('#email').val(),
          address: {
            street: $('#street').val(),
            city: $('#city').val(),
            state: $('#state').val(),
            country: $('#country').val()
          },
          loginId: $('#loginId').val(),
          password: $('#password').val()
        };

        $.ajax({
          url: '/api/users',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify(formData),
          success: function(response) {
            $('#responseMessage').html('<p class="success">' + response.message + '</p>');
            $('#userForm')[0].reset();
          },
          error: function(xhr) {
            const errRes = xhr.responseJSON;
            let errorText = '';
            if (errRes && errRes.errors) {
              errorText = errRes.errors.join('<br>');
            } else {
              errorText = 'An error occurred while saving data.';
            }
            $('#responseMessage').html('<p class="error">' + errorText + '</p>');
          }
        });
      });
    });
  </script>
</body>
</html>
