<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stored Users Data</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>

  <h2>Stored Users Data</h2>
  <a href="index.html">Back to Registration Form</a>

  <table id="usersTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Mobile No</th>
        <th>Email</th>
        <th>Address</th>
        <th>Login ID</th>
        <th>Creation Time</th>
        <th>Last Updated On</th>
      </tr>
    </thead>
    <tbody>
      <!-- Rows populated dynamically via jQuery AJAX -->
    </tbody>
  </table>

  <script>
    $(document).ready(function() {
      $.ajax({
        url: '/api/users',
        type: 'GET',
        dataType: 'json',
        success: function(response) {
          if (response.success && response.data.length > 0) {
            let tableRows = '';
            $.each(response.data, function(index, user) {
              const fullAddress = `${user.address.street || ''}, ${user.address.city || ''}, ${user.address.state || ''}, ${user.address.country || ''}`;
              
              tableRows += `<tr>
                <td>${user.firstName} ${user.lastName}</td>
                <td>${user.mobileNo}</td>
                <td>${user.email}</td>
                <td>${fullAddress}</td>
                <td>${user.loginId}</td>
                <td>${new Date(user.creationTime).toLocaleString()}</td>
                <td>${new Date(user.lastUpdatedOn).toLocaleString()}</td>
              </tr>`;
            });
            $('#usersTable tbody').html(tableRows);
          } else {
            $('#usersTable tbody').html('<tr><td colspan="7">No records found.</td></tr>');
          }
        },
        error: function() {
          alert('Failed to fetch users data.');
        }
      });
    });
  </script>
</body>
</html>
