<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Users Room - Task 2</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background-color: #007bff; color: white; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    .back-btn { display: inline-block; margin-bottom: 15px; color: #007bff; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

  <h2>Live Users Room ("live_users")</h2>
  <a href="index.html" class="back-btn">← Back to Registration Form</a> | 
  <a href="users.html" class="back-btn">All Stored Users</a>

  <table>
    <thead>
      <tr>
        <th>Socket ID / User ID</th>
        <th>User Email</th>
        <th>Name</th>
      </tr>
    </thead>
    <tbody id="liveUsersBody">
      <tr>
        <td colspan="3">Waiting for live events...</td>
      </tr>
    </tbody>
  </table>

  <script>
    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const BACKEND_URL = isLocal 
      ? 'http://localhost:10000' 
      : 'https://user-management-backend-0vv1-7xgt.onrender.com';

    const socket = io(BACKEND_URL, {
      transports: ['websocket', 'polling']
    });

    // 1. Load initial user list on room join
    $.get(`${BACKEND_URL}/api/users`, function(users) {
      const usersList = Array.isArray(users) ? users : (users.data || users.users || []);
      if (usersList && usersList.length > 0) {
        $('#liveUsersBody').empty();
        usersList.forEach(addUserToTable);
      }
    });

    // 2. Listen for both real-time socket events
    socket.on('userJoined', handleIncomingUser);
    socket.on('join_live_users', handleIncomingUser);

    function handleIncomingUser(user) {
      if ($('#liveUsersBody td').length <= 1) {
        $('#liveUsersBody').empty();
      }
      addUserToTable(user);
    }

    function addUserToTable(user) {
      if (!user) return;
      
      const name = (user.firstName && user.lastName) 
        ? `${user.firstName} ${user.lastName}` 
        : (user.name || 'N/A');

      const id = user._id || user.loginId || socket.id || 'Live User';
      const email = user.email || 'N/A';

      const row = `
        <tr>
          <td>${id}</td>
          <td>${email}</td>
          <td>${name}</td>
        </tr>
      `;
      $('#liveUsersBody').prepend(row);
    }
  </script>
</body>
</html>
